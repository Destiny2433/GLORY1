<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - ECWA GLORY</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Righteous&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #191970; 
            color: #fff; 
            font-family: 'Righteous', cursive; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }
        .login-container { 
            background: rgba(0,0,0,0.7); 
            padding: 40px; 
            border-radius: 15px; 
            text-align: center; 
            max-width: 400px; 
            width: 100%; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border-left: 5px solid #FFD700;
            box-sizing: border-box;
        }
        h1 { 
            color: #FFD700; 
            font-family: 'Bebas Neue', sans-serif; 
            font-size: 3rem; 
            margin-bottom: 20px; 
        }
        .form-group { 
            margin-bottom: 20px; 
        }
        input[type="password"] { 
            width: 100%; 
            padding: 15px; 
            border-radius: 5px; 
            border: 1px solid #ddd; 
            font-size: 1rem; 
            box-sizing: border-box;
        }
        button { 
            background: #FFD700; 
            color: #000; 
            border: none; 
            padding: 15px 30px; 
            cursor: pointer; 
            border-radius: 5px; 
            font-weight: bold; 
            font-size: 1.2rem;
            width: 100%;
            transition: background 0.3s ease;
        }
        button:hover { 
            background: #FFA500; 
        }
        .flash-message { 
            color: #ff4d4d; 
            margin-bottom: 15px; 
            font-weight: bold; 
        }
        .back-link {
            display: block;
            margin-top: 20px;
            color: #FFD700;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Admin Login</h1>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="flash-message">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <input type="password" name="password" placeholder="Enter Admin Password" required autofocus>
            </div>
            <button type="submit">Login</button>
        </form>
        <a href="{{ url_for('index') }}" class="back-link">&larr; Back to Site</a>
    </div>
</body>
</html>
